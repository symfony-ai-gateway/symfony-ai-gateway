name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring, sqlite3, pdo_sqlite
          coverage: xdebug
          tools: phpstan, php-cs-fixer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPStan
        run: composer stan

      - name: CS Fixer
        run: composer cs:check

      - name: PHPUnit
        run: composer test

  docker:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-gateway:latest .

      - name: Test Docker image
        run: |
          docker run -d --name gateway -p 8080:8080 ai-gateway:latest
          sleep 3
          curl -f http://localhost:8080/v1/health || (docker logs gateway && exit 1)
          docker stop gateway
